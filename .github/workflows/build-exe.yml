name: Build TikDL EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller PySide6 yt-dlp
    
    - name: Build EXE
      run: |
        cd tiktok_downloader_licensed
        pyinstaller --onefile --windowed --name "TikDL" `
          --add-data "core:core" `
          --add-data "ui:ui" `
          --add-data "utils:utils" `
          --hidden-import=PySide6 `
          --hidden-import=yt_dlp `
          main.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: TikDL-Windows
        path: tiktok_downloader_licensed/dist/TikDL.exe
