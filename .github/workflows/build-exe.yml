name: Build TikDL Executable

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4.2.2
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller PySide6 yt-dlp
    
    - name: Find and list Python files
      run: |
        echo "Searching for main.py..."
        Get-ChildItem -Recurse -Filter "main.py" | ForEach-Object { Write-Host $_.FullName }
        
        echo ""
        echo "Repository structure:"
        Get-ChildItem -Recurse -Directory | Select-Object -First 20 FullName
    
    - name: Build EXE (attempt 1 - if in tiktok_downloader_licensed folder)
      continue-on-error: true
      run: |
        cd tiktok_downloader_licensed
        pyinstaller --onefile --windowed --name "TikDL" `
          --add-data "core:core" `
          --add-data "ui:ui" `
          --add-data "utils:utils" `
          --hidden-import=PySide6 `
          --hidden-import=yt_dlp `
          main.py
        echo "Build attempt 1 completed"
    
    - name: Build EXE (attempt 2 - if in root folder)
      continue-on-error: true
      run: |
        if (-Not (Test-Path "dist\TikDL.exe")) {
          echo "Build from root folder..."
          pyinstaller --onefile --windowed --name "TikDL" `
            --add-data "core:core" `
            --add-data "ui:ui" `
            --add-data "utils:utils" `
            --hidden-import=PySide6 `
            --hidden-import=yt_dlp `
            main.py
        }
    
    - name: Check for EXE (attempt 1 location)
      continue-on-error: true
      run: |
        if (Test-Path "tiktok_downloader_licensed\dist\TikDL.exe") {
          echo "Found EXE in tiktok_downloader_licensed/dist/"
          Move-Item -Path "tiktok_downloader_licensed\dist\TikDL.exe" -Destination "TikDL.exe"
          echo "Moved to root"
        }
    
    - name: Check for EXE (attempt 2 location)
      continue-on-error: true
      run: |
        if (Test-Path "dist\TikDL.exe") {
          echo "Found EXE in dist/"
          Copy-Item -Path "dist\TikDL.exe" -Destination "TikDL.exe"
        }
    
    - name: Verify EXE exists
      run: |
        if (Test-Path "TikDL.exe") {
          $size = (Get-Item "TikDL.exe").Length / 1MB
          Write-Host "✓ SUCCESS: TikDL.exe created ($([Math]::Round($size, 2)) MB)"
        } else {
          Write-Host "✗ FAILED: TikDL.exe not found"
          Write-Host "Checking all locations:"
          Get-ChildItem -Recurse -Filter "TikDL.exe"
          exit 1
        }
    
    - name: Upload artifact
      if: success()
      uses: actions/upload-artifact@v4.4.3
      with:
        name: TikDL-Windows-Executable
        path: TikDL.exe
        if-no-files-found: error
