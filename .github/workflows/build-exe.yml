name: Build TikDL Executable

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4.2.2
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller PySide6 yt-dlp
    
    - name: Check for icon file
      run: |
        if (Test-Path "icon.ico") {
          Write-Host "✓ Icon file found"
        } else {
          Write-Host "⚠ No icon file found (optional)"
        }
    
    - name: Build executable with PyInstaller
      run: |
        cd tiktok_downloader_licensed
        
        # Copy icon from root if it exists
        if (Test-Path "..\icon.ico") {
          Copy-Item "..\icon.ico" -Destination "icon.ico"
          Write-Host "Icon copied to build directory"
        }
        
        # Build with or without icon
        if (Test-Path "icon.ico") {
          Write-Host "Building with custom icon..."
          pyinstaller --onefile --windowed --name "TikDL" `
            --add-data "core:core" `
            --add-data "ui:ui" `
            --add-data "utils:utils" `
            --hidden-import=PySide6 `
            --hidden-import=yt_dlp `
            -i icon.ico `
            main.py
        } else {
          Write-Host "Building without custom icon..."
          pyinstaller --onefile --windowed --name "TikDL" `
            --add-data "core:core" `
            --add-data "ui:ui" `
            --add-data "utils:utils" `
            --hidden-import=PySide6 `
            --hidden-import=yt_dlp `
            main.py
        }
    
    - name: Verify executable exists
      run: |
        if (Test-Path "tiktok_downloader_licensed\dist\TikDL.exe") {
          $size = (Get-Item "tiktok_downloader_licensed\dist\TikDL.exe").Length / 1MB
          Write-Host "✓ TikDL.exe created ($([Math]::Round($size, 2)) MB)"
          Move-Item -Path "tiktok_downloader_licensed\dist\TikDL.exe" -Destination "TikDL.exe"
        } else {
          Write-Host "✗ TikDL.exe not found!"
          exit 1
        }
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4.4.3
      with:
        name: TikDL-Windows-Executable
        path: TikDL.exe
        if-no-files-found: error
